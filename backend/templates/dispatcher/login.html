<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEEE Dispatcher Portal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-accent: #38BDF8;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --error-color: #F87171;
            --input-border: #334155;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            font-weight: 800;
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #38BDF8, #818CF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #38BDF8 0%, #3B82F6 100%);
            border: none;
            border-radius: 8px;
            color: #0F172A;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover {
            opacity: 0.95;
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        .error-msg {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--error-color);
            border-radius: 8px;
            color: var(--error-color);
            padding: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>ZEEE Portal</h1>
        <p class="subtitle">Logistics & Warehouse Dispatch Center</p>
        
        {% if error %}
        <div class="error-msg">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username / Email</label>
                <input type="text" id="username" name="username" placeholder="Enter dispatcher ID" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">AUTHORIZE SESSION</button>
        </form>
    </div>
</body>
</html>
